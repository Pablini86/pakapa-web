<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background circle -->
  <rect width="32" height="32" rx="8" fill="#0d1117"/>
  <!-- Asterisk star shape in aqua, matching PAKAPA logo style -->
  <g transform="translate(16,16)" fill="#067f82">
    <!-- 6 lines radiating from center, like the PAKAPA asterisk -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#067f82" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8.66" y1="-5" x2="8.66" y2="5" stroke="#067f82" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8.66" y1="5" x2="8.66" y2="-5" stroke="#067f82" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
